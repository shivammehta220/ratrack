                          card_mod:
                            style: 'ha-card { border-radius: 18px; }'
                        - type: custom:mushroom-entity-card
                          entity: >-
                            switch.gl_inet_mt6000_wg_client_vpn_profile_2
                          name: VPN Profile 2
                          icon: fas:key
                          layout: horizontal
                          tap_action:
                            action: toggle
                          hold_action: none
                          card_mod:
                            style: 'ha-card { border-radius: 18px; }'
                        - type: custom:mushroom-entity-card
                          entity: >-
                            switch.gl_inet_mt6000_wg_client_vpn_profile_3
                          name: VPN Profile 3
                          icon: fas:key
                          layout: horizontal
                          tap_action:
                            action: toggle
                          hold_action: none
                          card_mod:
                            style: 'ha-card { border-radius: 18px; }'
                        - type: custom:mushroom-entity-card
                          entity: >-
                            switch.gl_inet_mt6000_wg_client_vpn_profile_4
                          name: VPN Profile 4
                          icon: fas:key
                          layout: horizontal
                          tap_action:
                            action: toggle
                          hold_action: none
                          card_mod:
                            style: 'ha-card { border-radius: 18px; }'
                        - type: custom:mushroom-entity-card
                          entity: >-
                            switch.gl_inet_mt6000_wg_client_vpn_profile_5
                          name: VPN Profile 5
                          icon: fas:key
                          layout: horizontal
                          tap_action:
                            action: toggle
                          hold_action: none
                          card_mod:
                            style: 'ha-card { border-radius: 18px; }'
                        - type: custom:mushroom-entity-card
                          entity: >-
                            switch.gl_inet_mt6000_wg_client_vpn_profile_6
                          name: VPN Profile 6
                          icon: fas:key
                          layout: horizontal
                          tap_action:
                            action: toggle
                          hold_action: none
                          card_mod:
                            style: 'ha-card { border-radius: 18px; }'
              - attributes:
                  label: Controls
                  icon: fas:sliders
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:mushroom-title-card
                      title: Router Controls
                      alignment: center
                      card_mod:
                        style: |
                          ha-card { border-radius: 18px; padding-bottom: 2px; }
                    - type: grid
                      columns: 3
                      square: false
                      cards:
                        - type: custom:mushroom-entity-card
                          entity: switch.gl_inet_mt6000_tailscale
                          name: Tailscale
                          icon: fas:route
                          layout: vertical
                          tap_action:
                            action: toggle
                          hold_action: none
                          fill_container: true
                          card_mod:
                            style: |
                              ha-card { border-radius: 18px; }
                        - type: custom:mushroom-entity-card
                          entity: switch.gl_inet_mt6000_my_wifi_5g
                          name: SSID <YOUR_5G_SSID>
                          icon: fas:wifi
                          layout: vertical
                          tap_action:
                            action: toggle
                          hold_action: none
                          fill_container: true
                          card_mod:
                            style: |
                              ha-card { border-radius: 18px; }
                        - type: custom:mushroom-entity-card
                          entity: switch.gl_inet_mt6000_my_wifi_iot
                          name: SSID <YOUR_IOT_SSID>
                          icon: fas:wifi
                          layout: vertical
                          tap_action:
                            action: toggle
                          hold_action: none
                          fill_container: true
                          card_mod:
                            style: |
                              ha-card { border-radius: 18px; }
          - type: custom:tabbed-card
