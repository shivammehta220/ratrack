                  icon: fas:shield-halved
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:mushroom-title-card
                      title: WireGuard — VPN Profiles
                      alignment: center
                      card_mod:
                        style: |
                          ha-card { border-radius: 18px; padding-bottom: 2px; }
                    - type: grid
                      columns: 2
                      square: false
                      cards:
                        - type: custom:mushroom-entity-card
