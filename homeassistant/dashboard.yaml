button_card_templates:
  tailscale_summary:
    show_icon: true
    show_name: true
    show_label: true
    show_state: false
    icon: mdi:vpn
    name: Tailscale Devices
    label: |
      [[[
        // Online threshold (minutes)
        const THRESH_MIN = 10;
        const THRESH_MS = THRESH_MIN * 60 * 1000;

        // Find all tailscale last_seen sensors (pattern you have: sensor.<base>_last_seen)
        const lastSeenEntities = Object.keys(states)
          .filter(eid => /^sensor\..+_last_seen$/.test(eid));

        const now = Date.now();
        let total = 0, online = 0, offline = 0, unknown = 0;

        for (const eid of lastSeenEntities) {
          const st = states[eid]?.state;
          total++;

          // Handle unknown/unavailable
          if (!st || st === 'unknown' || st === 'unavailable') {
            unknown++;
            continue;
          }

          const t = Date.parse(st);
          if (isNaN(t)) {
            unknown++;
            continue;
          }

          const isOnline = (now - t) <= THRESH_MS;
          if (isOnline) online++;
          else offline++;
        }

        return `Total: ${total} • Online: ${online} • Offline: ${offline}` +
               (unknown ? ` • Unknown: ${unknown}` : ``) +
               `\nOnline threshold: last seen ≤ ${THRESH_MIN} min`;
      ]]]
    styles:
      card:
        - padding: 16px
        - border-radius: 16px
      grid:
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 42px 1fr
        - grid-template-rows: min-content min-content
        - column-gap: 12px
      icon:
        - width: 28px
      name:
        - font-size: 18px
        - font-weight: 700
      label:
        - font-size: 13px
        - white-space: pre-line
        - line-height: 1.25
        - opacity: 0.9
  tailscale_device:
    show_icon: true
    show_name: true
    show_label: true
    show_state: false
    tap_action:
      action: more-info
    hold_action:
      action: more-info
    icon: mdi:laptop
    label: |
      [[[
        // Online threshold (minutes)
        const THRESH_MIN = 10;
        const THRESH_MS = THRESH_MIN * 60 * 1000;

        // base from sensor.<base>_last_seen
        const base = entity.entity_id
          .replace('sensor.', '')
          .replace(/_last_seen$/, '');

        const lastSeen = states[`sensor.${base}_last_seen`]?.state ?? '—';
        const ip       = states[`sensor.${base}_ip_address`]?.state ?? '—';
        const expires  = states[`sensor.${base}_expires`]?.state ?? '—';
        const keyDis   = states[`binary_sensor.${base}_key_expiry_disabled`]?.state ?? 'unknown';

        // Update available (your "client" entity)
        const upd      = states[`binary_sensor.${base}_client`]?.state ?? 'unknown';

        // Online/offline derived from last_seen age
        let onlineTxt = 'Unknown';
        let isOnline = null;

        if (lastSeen && lastSeen !== 'unknown' && lastSeen !== 'unavailable') {
          const t = Date.parse(lastSeen);
          if (!isNaN(t)) {
            isOnline = (Date.now() - t) <= THRESH_MS;
            onlineTxt = isOnline ? 'Online' : 'Offline';
          }
        }

        const keyTxt =
          (keyDis === 'on') ? 'Key expiry: disabled' :
          (keyDis === 'off') ? 'Key expiry: enabled' :
          'Key expiry: —';

        const updTxt =
          (upd === 'on') ? 'Update: available' :
          (upd === 'off') ? 'Update: none' :
          'Update: —';

        return `${onlineTxt} • Last: ${lastSeen}\nIP: ${ip} • Expires: ${expires}\n${keyTxt} • ${updTxt}`;
      ]]]
    styles:
      card:
        - padding: 14px
        - border-radius: 16px
      grid:
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 42px 1fr
        - grid-template-rows: min-content min-content
        - column-gap: 12px
      icon:
        - width: 28px
      name:
        - font-size: 16px
        - font-weight: 600
        - align-self: center
      label:
        - font-size: 13px
        - line-height: 1.25
        - white-space: pre-line
        - opacity: 0.9
    state: null
