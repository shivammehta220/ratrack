# Samba configuration for Ratrack NAS
# Place at /etc/samba/smb.conf on the Proxmox host.
#
# Replace <HOSTNAME> with your Proxmox hostname (e.g. plankton).
# Replace <USERNAME> with your NAS user account.

[global]
   workgroup = WORKGROUP
   server string = <HOSTNAME>
   security = user
   map to guest = Bad User
   guest ok = no
   log file = /var/log/samba/%m.log
   max log size = 200
   load printers = no
   printcap name = /dev/null

   # macOS compatibility (metadata, resource forks, Finder streams)
   ea support = yes
   vfs objects = catia fruit streams_xattr
   fruit:metadata = stream
   fruit:resource = file
   fruit:time machine = no

   # Default permissions for new files/dirs
   create mask = 0664
   directory mask = 0775

# ----- SHARES -----

# NVMe projects disk (fast, 500 GB)
[projects]
   comment = NVMe Projects
   path = /srv/projects
   browseable = yes
   read only = no
   guest ok = no
   valid users = <USERNAME>
   force user = <USERNAME>
   hide files = /lost+found/.Trash-*/._*/.DS_Store/Thumbs.db/

# 1 TB archive data disk
[archive1]
   comment = Archive SSD (1 TB)
   path = /srv/archive1
   browseable = yes
   read only = no
   guest ok = no
   valid users = <USERNAME>
   force user = <USERNAME>
   hide files = /lost+found/.Trash-*/._*/.DS_Store/Thumbs.db/

# MergerFS pool spanning projects + archive1
[storage]
   comment = MergerFS Pool
   path = /mnt/storage
   browseable = yes
   read only = no
   guest ok = no
   valid users = <USERNAME>
   force user = <USERNAME>
   hide files = /lost+found/.Trash-*/._*/.DS_Store/Thumbs.db/

# NOTE: Do NOT share parity over the network.
# If you need read-only visibility for debugging, uncomment below:
# [parity1]
#    comment = SnapRAID Parity (read-only)
#    path = /srv/parity1
#    browseable = yes
#    read only = yes
#    guest ok = no
#    valid users = <USERNAME>
#    force user = <USERNAME>
#    hide files = /snapraid.parity/
