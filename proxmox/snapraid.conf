# SnapRAID configuration for Ratrack NAS
# Place at /etc/snapraid.conf on the Proxmox host.
#
# Parity disk must be >= the largest data disk.
# Here: 1 TB parity covers 500 GB (projects) + 1 TB (archive1).

# ===== Parity (file on the dedicated parity filesystem) =====
parity /srv/parity1/snapraid.parity

# ===== Content files (checksums — spread across multiple disks for safety) =====
content /srv/projects/.snapraid.content
content /srv/archive1/.snapraid.content

# ===== Data disks =====
data projects /srv/projects/
data archive1 /srv/archive1/

# ===== Exclusions =====
exclude /lost+found/
exclude @Recycle/
exclude #recycle/
exclude .recycle/
exclude .Trash-*/
exclude *.tmp
exclude *.swp
exclude ._*
exclude .DS_Store
exclude Thumbs.db
exclude ~*
exclude *.bak
exclude *.partial~
